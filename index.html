<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RUSH HOUR ANALYZER</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="//unpkg.com/globe.gl"></script>
    
    <style>
        :root {
            --bg-dark: #060614;
            --panel-bg: #0a0a1f;
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --accent-purple: #4b0082; 
            --column-heading: #6666cc; 
            
            --color-under: #ff3333;
            --color-range: #00ddee;
            --color-over: #00ff44;
            --color-exact: #ffaa00;
        }

        body, html {
            margin: 0; padding: 0; height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Контейнер для глобуса */
        #globeViz { flex-grow: 1; width: 100%; background: #000; }

        .bottom-panel {
            background-color: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            border-radius: 20px 20px 0 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        /* Сохраняем твою сетку и стили кнопок */
        .prediction-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 8px; }
        .controls-grid { display: grid; grid-template-columns: 1.2fr 1.3fr 1.2fr 1.4fr; gap: 12px; }
        .column { display: flex; flex-direction: column; gap: 8px; }
        
        h2 { font-size: 0.65rem; color: var(--column-heading); margin: 0; text-transform: uppercase; letter-spacing: 0.8px; font-weight: bold; }
        .static-log-text { font-size: 0.7rem; color: #ffffff; font-family: monospace; height: 20px; display: flex; align-items: center; }
        .version-tag { font-size: 0.6rem; color: #aaaaaa; font-family: monospace; margin-top: 2px; }

        input[type="text"] {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color); color: var(--text-main);
            font-size: 0.85rem; border-radius: 8px; box-sizing: border-box;
        }

        .btn-action {
            width: 100%; padding: 15px 5px; background: var(--accent-purple); 
            color: #fff; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; text-transform: uppercase; font-size: 0.65rem; font-weight: 700;
        }

        .btn-analyze { background: #530094; font-weight: 900; }

        .log-box {
            background: rgba(0,0,0,0.3); border: 1px solid var(--border-color);
            padding: 8px; font-size: 0.65rem; color: #ffffff;
            height: 75px; overflow-y: auto; font-family: monospace; border-radius: 8px;
        }

        .outcome-card {
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            gap: 4px; padding: 8px; background: rgba(255, 255, 255, 0.02); 
            border: 1px solid var(--border-color); border-radius: 10px; opacity: 0.15; transition: 0.4s;
        }

        .outcome-card.active { opacity: 1; }
        #card-under.active { border-color: var(--color-under); background: rgba(255, 51, 51, 0.15); }
        #card-range.active { border-color: var(--color-range); background: rgba(0, 221, 238, 0.15); }
        #card-over.active { border-color: var(--color-over); background: rgba(0, 255, 68, 0.15); }
        #card-exact.active { border-color: var(--color-exact); background: rgba(255, 170, 0, 0.15); }
        
        .icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .icon.under { background: var(--color-under); }
        .icon.range { background: var(--color-range); }
        .icon.over { background: var(--color-over); }
        .icon.exact { background: var(--color-exact); }
        .outcome-label { font-size: 0.55rem; font-weight: bold; text-transform: uppercase; }

        .header-tag {
            position: absolute; top: 15px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.8); padding: 5px 15px;
            border: 1px solid var(--border-color); font-size: 0.75rem; border-radius: 20px;
        }

        /* Языковое меню */
        .lang-selector-btn { position: absolute; top: 15px; right: 20px; z-index: 1002; background: rgba(0,0,0,0.8); padding: 5px 10px; border: 1px solid var(--border-color); border-radius: 15px; cursor: pointer; }
        .lang-menu { position: absolute; top: 50px; right: 20px; z-index: 1001; background: rgba(10, 10, 31, 0.95); border: 1px solid var(--border-color); border-radius: 10px; display: none; flex-direction: column; }
        .lang-menu.show { display: flex; }
        .lang-option { padding: 10px 15px; color: white; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

    <div class="header-tag">RUSH HOUR ANALYZER</div>
    
    <div class="lang-selector-btn" id="lang-btn" onclick="toggleLangMenu()">🇷🇺</div>
    <div class="lang-menu" id="lang-menu">
        <div class="lang-option" onclick="setLanguage('ru', '🇷🇺')">🇷🇺 RU</div>
        <div class="lang-option" onclick="setLanguage('en', '🇬🇧')">🇬🇧 EN</div>
        <div class="lang-option" onclick="setLanguage('es', '🇪🇸')">🇪🇸 ES</div>
        <div class="lang-option" onclick="setLanguage('pt', '🇵🇹')">🇵🇹 PT</div>
    </div>

    <div id="globeViz"></div>

    <div class="bottom-panel">
        <div class="outcomes-section">
            <h2 id="ui-outcome">ИСХОД:</h2>
            <div class="prediction-row">
                <div class="outcome-card" id="card-under"><div class="icon under">▼</div><div class="outcome-label">Under</div></div>
                <div class="outcome-card" id="card-range"><div class="icon range">↔</div><div class="outcome-label">Range</div></div>
                <div class="outcome-card" id="card-over"><div class="icon over">▲</div><div class="outcome-label">Over</div></div>
                <div class="outcome-card" id="card-exact"><div class="icon exact">★</div><div class="outcome-label">Exact</div></div>
            </div>
        </div>

        <div class="controls-grid">
            <div class="column">
                <h2 id="ui-status">СТАТУС:</h2>
                <div class="static-log-text">> <span id="ui-log-loaded">Лог загружен</span></div>
                <button class="btn-action" id="ui-btn-load" onclick="actionLoadLog()">Загрузить лог</button>
                <div class="version-tag">version: release 1.0.9</div>
            </div>
            <div class="column">
                <div style="height: 38px;"></div> 
                <button class="btn-action btn-analyze" id="ui-btn-analyze" onclick="doSearch()">Анализировать</button>
            </div>
            <div class="column">
                <h2 id="ui-data">ДАННЫЕ:</h2>
                <input type="text" id="text-input" placeholder="">
            </div>
            <div class="column">
                <h2 id="ui-syslog">СИСТЕМНЫЙ ЛОГ:</h2>
                <div class="log-box" id="log-display"><div>> <span id="ui-syslog-loaded">Лог загружен</span></div></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- ТВОЙ СЛОВАРЬ ---
        const dictionary = {
            ru: { outcome: "ИСХОД:", status: "СТАТУС:", data: "ДАННЫЕ:", syslog: "СИСТЕМНЫЙ ЛОГ:", logLoaded: "Лог загружен", logUpdated: "Лог обновлен успешно", btnLoad: "Загрузить лог", btnAnalyze: "Анализировать", errEmpty: "Введите адрес", logSearch: "Анализ:", logFoundDB: "Локация найдена в базе", logNotFound: "Адрес не распознан", errNet: "Ошибка сети", logDone: "ГОТОВО:" },
            en: { outcome: "OUTCOME:", status: "STATUS:", data: "DATA:", syslog: "SYSTEM LOG:", logLoaded: "Log loaded", logUpdated: "Log updated successfully", btnLoad: "Load log", btnAnalyze: "Analyze", errEmpty: "Enter address", logSearch: "Analysis:", logFoundDB: "Location found in DB", logNotFound: "Address not recognized", errNet: "Network error", logDone: "DONE:" },
            es: { outcome: "RESULTADO:", status: "ESTADO:", data: "DATOS:", syslog: "REGISTRO DEL SISTEMA:", logLoaded: "Registro cargado", logUpdated: "Registro actualizado", btnLoad: "Cargar registro", btnAnalyze: "Analizar", errEmpty: "Ingrese dirección", logSearch: "Análisis:", logFoundDB: "Ubicación en BD", logNotFound: "Dirección no reconocida", errNet: "Error de red", logDone: "HECHO:" },
            pt: { outcome: "RESULTADO:", status: "STATUS:", data: "DADOS:", syslog: "LOG DO SISTEMA:", logLoaded: "Log carregado", logUpdated: "Log actualizado", btnLoad: "Carregar log", btnAnalyze: "Analisar", errEmpty: "Digite o endereço", logSearch: "Análise:", logFoundDB: "Localização no BD", logNotFound: "Endereço não reconhecido", errNet: "Erro de rede", logDone: "FEITO:" }
        };

        let currentLang = 'ru';
        function setLanguage(lang, flag) {
            currentLang = lang;
            document.getElementById('lang-btn').innerText = flag;
            document.getElementById('lang-menu').classList.remove('show');
            const t = dictionary[lang];
            document.getElementById('ui-outcome').innerText = t.outcome;
            document.getElementById('ui-status').innerText = t.status;
            document.getElementById('ui-data').innerText = t.data;
            document.getElementById('ui-syslog').innerText = t.syslog;
            document.getElementById('ui-log-loaded').innerText = t.logLoaded;
            document.getElementById('ui-syslog-loaded').innerText = t.logLoaded;
            document.getElementById('ui-btn-load').innerText = t.btnLoad;
            document.getElementById('ui-btn-analyze').innerText = t.btnAnalyze;
        }

        function toggleLangMenu() { document.getElementById('lang-menu').classList.toggle('show'); }

        // --- ИНИЦИАЛИЗАЦИЯ ГЛОБУСА ---
        const world = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
            .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
            .backgroundColor('#060614')
            .showAtmosphere(true)
            .atmosphereColor('#4b0082')
            .atmosphereDaylightAlpha(0.1);

        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 0.5;

        // Авто-подбор размера при изменении окна
        window.addEventListener('resize', () => {
            world.width(window.innerWidth);
            world.height(document.getElementById('globeViz').offsetHeight);
        });

        const locationsDB = {
            "shinjuku 1 tokyo": [35.6908, 139.7046],
            "mezhdunarodnaya st russia": [55.7481, 37.5388],
            "iuliu maniu blvd romania": [44.4355, 26.0500],
            "saint bon square la spezia": [44.1104, 9.8143],
            "southern ring road groningen": [53.2045, 6.5710],
            "shinjuku kabukicho 2 tokyo": [35.6953, 139.7025],
            "freedom square groningen": [53.2001, 6.5562],
            "lenin-druzhby russia": [48.7845, 44.7770],
            "piata roman voda romania": [46.9284, 26.9276],
            "shinjuku 3 tokyo": [35.6905, 139.7046],
            "grand ave glenwood springs": [39.5463, -107.3253]
        };

        function log(msg) {
            const display = document.getElementById('log-display');
            display.innerHTML += `<div>> ${msg}</div>`;
            display.scrollTop = display.scrollHeight;
        }

        function actionLoadLog() { log(dictionary[currentLang].logUpdated); }

        function findLocalCoords(query) {
            const q = query.toLowerCase().replace(/[.,]/g, '');
            const qWords = q.split(/\s+/).filter(w => w.length > 2);
            for (const [name, coords] of Object.entries(locationsDB)) {
                const nameWords = name.toLowerCase().split(/\s+/);
                let matches = 0;
                qWords.forEach(w => { if (nameWords.includes(w)) matches++; });
                if (matches >= 2) return coords;
            }
            return null;
        }

        async function doSearch() {
            const t = dictionary[currentLang];
            const query = document.getElementById('text-input').value;
            if (!query) { log(t.errEmpty); return; }
            resetUI();
            log(`${t.logSearch} ${query}`);

            const localCoords = findLocalCoords(query);

            if (localCoords) {
                log(t.logFoundDB);
                showOnGlobe(localCoords[0], localCoords[1]);
            } else {
                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                    const data = await response.json();
                    if (data.length > 0) {
                        showOnGlobe(data[0].lat, data[0].lon);
                    } else { log(t.logNotFound); }
                } catch (e) { log(t.errNet); }
            }
        }

        function showOnGlobe(lat, lon) {
            const latNum = parseFloat(lat);
            const lonNum = parseFloat(lon);

            // 1. Ставим неоновую точку на глобус
            world.pointsData([{ lat: latNum, lng: lonNum, size: 0.1, color: '#8a2be2' }]);
            
            // 2. Эффектный перелет
            world.controls().autoRotate = false; // Останавливаем вращение
            world.pointOfView({ lat: latNum, lng: lonNum, alt: 0.5 }, 2500); // alt 0.5 - это сильное приближение

            setTimeout(() => { calculateFinalResult(); }, 2600);
        }

        function calculateFinalResult() {
            const t = dictionary[currentLang];
            const options = ['card-under', 'card-over'];
            const winner = options[Math.floor(Math.random() * options.length)];
            document.getElementById(winner).classList.add('active');
            log(`${t.logDone} ${winner === 'card-under' ? 'UNDER' : 'OVER'}`);
        }

        function resetUI() { 
            document.querySelectorAll('.outcome-card').forEach(c => c.classList.remove('active')); 
            world.pointsData([]); // Убираем старые точки
        }
    </script>
</body>
</html>
