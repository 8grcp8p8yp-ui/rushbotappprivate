<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUSH HOUR ANALYZER</title>
    <style>
        /* Твой оригинальный стиль */
        body { background-color: #0d0d0d; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .search-box { width: 100%; max-width: 400px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #bc13fe; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; margin-top: 10px; padding: 12px; background: #bc13fe; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
        iframe { width: 100%; height: 400px; border: 1px solid #bc13fe; border-radius: 10px; display: none; }
        h2 { color: #bc13fe; text-shadow: 0 0 10px #bc13fe; }
    </style>
</head>
<body>

    <h2>RUSH HOUR ANALYZER</h2>

    <div class="search-box">
        <input type="text" id="camInput" placeholder="Вставь адрес со скриншота...">
        <button onclick="searchCam()">НАЙТИ НА КАРТЕ</button>
    </div>

    <iframe id="mapFrame" frameborder="0"></iframe>

<script>
    // База координат по твоим скриншотам
    const cameras = {
        "SANTA ANA": "33.9912,-118.1501",
        "LONG BEACH": "33.9715,-118.1755",
        "FREEDOM SQUARE": "53.2045,6.5512",
        "SOUTHERN RING": "53.2030,6.5645",
        "LENIN": "56.6215,47.8540",
        "GRAND AVE": "39.5482,-107.3255",
        "ROMAN VODA": "46.9275,26.9458",
        "SAINT BON": "44.1105,9.8145"
    };

    function searchCam() {
        const val = document.getElementById('camInput').value.toUpperCase();
        const frame = document.getElementById('mapFrame');
        let coords = "";

        // Проверяем, есть ли совпадение хотя бы по 2 словам или части названия
        for (let name in cameras) {
            if (val.includes(name)) {
                coords = cameras[name];
                break;
            }
        }

        if (coords) {
            // z=17 — это сильный зум, чтобы видеть перекресток как на скрине
            frame.src = `https://www.google.com/maps?q=${coords}&z=17&output=embed`;
            frame.style.display = "block";
        } else if (val.length > 5) {
            // Если в базе нет, просто ищем это место в Google
            frame.src = `https://www.google.com/maps?q=${encodeURIComponent(val)}&z=15&output=embed`;
            frame.style.display = "block";
        } else {
            alert("Нужно больше данных для поиска");
        }
    }

    // Чтобы поиск работал по нажатию Enter
    document.getElementById('camInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') searchCam();
    });
</script>

</body>
</html>
