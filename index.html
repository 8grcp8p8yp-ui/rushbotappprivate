<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RUSH HOUR ANALYZER</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --bg-dark: #060614;
            --panel-bg: #0a0a1f;
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --accent-purple: #4b0082; 
            --column-heading: #6666cc; 
            --color-under: #ff3333;
            --color-range: #00ddee;
            --color-over: #00ff44;
            --color-exact: #ffaa00;
        }

        body, html {
            margin: 0; padding: 0; 
            height: 100dvh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* ПЛАНЕТА: Поднята вверх, центр находится в центре верхней части */
        #globeViz { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 50vh; /* Занимает половину экрана */
            transform: translateY(0); /* Не опускаем */
            background: #000; 
            z-index: 1;
        }

        /* НИЖНЯЯ ПАНЕЛЬ: Осталась на своем месте без изменений */
        .bottom-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            border-radius: 25px 25px 0 0;
            padding: 20px 15px calc(20px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .prediction-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            align-items: end; 
        }

        .column { display: flex; flex-direction: column; gap: 8px; }
        
        h2 { 
            font-size: 0.65rem; 
            color: var(--column-heading); 
            margin: 0; 
            text-transform: uppercase; 
            font-weight: bold;
        }

        /* Перекрасил текст СТАТУСА в белый */
        .static-log-text { font-size: 0.7rem; color: #ffffff; font-family: monospace; }
        .version-tag { font-size: 0.6rem; color: #555; font-family: monospace; margin-top: 5px; text-align: center; }

        .btn-action {
            width: 100%;
            padding: 14px 5px;
            background: var(--accent-purple); 
            color: #fff; 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            text-transform: uppercase; 
            font-size: 0.65rem; 
            font-weight: 800;
            cursor: pointer;
        }

        .btn-analyze {
            background: #530094;
            padding: 16px 5px;
        }

        /* Перекрасил текст ЛОГОВ в белый */
        .log-box {
            background: rgba(0,0,0,0.4); border: 1px solid var(--border-color);
            padding: 8px; font-size: 0.65rem; color: #ffffff;
            height: 65px; overflow-y: auto; font-family: monospace; border-radius: 10px;
        }

        .outcome-card {
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 10px; background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--border-color); border-radius: 12px; opacity: 0.2;
            transition: 0.3s;
        }

        .outcome-card.active { opacity: 1; }
        #card-under.active { border-color: var(--color-under); box-shadow: 0 0 15px rgba(255, 51, 51, 0.2); }
        #card-range.active { border-color: var(--color-range); box-shadow: 0 0 15px rgba(0, 221, 238, 0.2); }
        #card-over.active { border-color: var(--color-over); box-shadow: 0 0 15px rgba(0, 255, 68, 0.2); }
        #card-exact.active { border-color: var(--color-exact); box-shadow: 0 0 15px rgba(255, 170, 0, 0.2); }
        
        .icon { width: 26px; height: 26px; border-radius: 50%; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; }
        .icon.under { background: var(--color-under); }
        .icon.range { background: var(--color-range); }
        .icon.over { background: var(--color-over); }
        .icon.exact { background: var(--color-exact); }
        .outcome-label { font-size: 0.55rem; font-weight: bold; margin-top: 4px; color: #aaa; }

        .header-tag {
            position: absolute; top: 15px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.7); padding: 6px 14px;
            border: 1px solid var(--border-color); font-size: 0.65rem;
            color: white; border-radius: 20px; font-weight: bold;
        }

        /* Загрузка: Машинка и Текст */
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(6, 6, 20, 0.95);
            display: none; justify-content: center; align-items: center; flex-direction: column;
            z-index: 9999;
        }
        .car-container {
            width: 150px;
            height: 60px;
            position: relative;
            margin-bottom: 20px;
            overflow: visible; /* Чтобы дым вылетал */
        }
        .car-loader-gif {
            width: 100%;
            height: auto;
            /* Фильтры делают машинку белой */
            filter: grayscale(100%) brightness(300%) contrast(120%);
            z-index: 2;
            position: relative;
        }
        /* Дым за машинкой */
        .smoke-puff {
            position: absolute;
            bottom: -5px;
            left: 20px;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            filter: blur(5px);
            animation: smoke-anim 0.6s infinite linear;
            z-index: 1;
        }
        @keyframes smoke-anim {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2.5) translateX(-20px) translateY(-10px); opacity: 0; }
        }

        .loader-line {
            width: 120px; height: 3px; background: rgba(255,255,255,0.1);
            position: relative; overflow: hidden; border-radius: 2px;
        }
        .loader-line::after {
            content: ''; width: 40px; height: 100%; background: var(--accent-purple);
            position: absolute; left: -40px; animation: move 0.8s linear infinite;
        }
        @keyframes move { 0% { left: -40px; } 100% { left: 120px; } }
        .loading-text { color: white; font-size: 0.8rem; margin-top: 15px; font-family: monospace; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="header-tag">RUSH HOUR ANALYZER</div>
    
    <div id="globeViz"></div>

    <div id="loading-overlay" class="loading-overlay">
        <div class="car-container">
            <div class="smoke-puff"></div>
            <img src="1.gif" id="car-gif" class="car-loader-gif" alt="">
        </div>
        <div class="loader-line"></div>
        <div class="loading-text">ЗАГРУЗКА . . .</div>
    </div>

    <div class="bottom-panel">
        <div>
            <h2>ИСХОД:</h2>
            <div class="prediction-row">
                <div class="outcome-card" id="card-under"><div class="icon under">▼</div><div class="outcome-label">UNDER</div></div>
                <div class="outcome-card" id="card-range"><div class="icon range">↔</div><div class="outcome-label">RANGE</div></div>
                <div class="outcome-card" id="card-over"><div class="icon over">▲</div><div class="outcome-label">OVER</div></div>
                <div class="outcome-card" id="card-exact"><div class="icon exact">★</div><div class="outcome-label">EXACT</div></div>
            </div>
        </div>

        <div class="controls-grid">
            <div class="column">
                <h2>STATUS:</h2>
                <div class="static-log-text">> OK</div>
                <button class="btn-action" onclick="actionLoadLog()">LOG</button>
            </div>
            <div class="column">
                <button class="btn-action btn-analyze" onclick="startAnalysis()">АНАЛИЗ</button>
            </div>
            <div class="column">
                <h2>LOG:</h2>
                <div class="log-box" id="log-display"></div>
            </div>
        </div>
        <div class="version-tag">release 1.0.9</div>
    </div>

    <script src="//unpkg.com/globe.gl"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Сдвинул глобус выше
        const world = Globe()(document.getElementById('globeViz'))
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
            .backgroundColor('#060614')
            .showAtmosphere(true)
            .atmosphereColor('#4b0082')
            .atmosphereDaylightAlpha(0.1);

        // ИСПРАВИЛ БАГ: ПЛАНЕТА КРУТИТСЯ САМА ВСЕ ВРЕМЯ МЕДЛЕННО
        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 1.2;
        world.controls().enableZoom = false; // Отключаем зум чтобы не мешал скроллу

        function triggerAnalysis() {
            document.querySelectorAll('.outcome-card').forEach(c => c.classList.remove('active'));
            
            if (Math.random() < 0.6) {
                const overlay = document.getElementById('loading-overlay');
                overlay.style.display = 'flex';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    finishAnalysis();
                }, 4000); // 4 секунды загрузки
            } else {
                finishAnalysis();
            }
        }

        function finishAnalysis() {
            // ИСПРАВИЛ ЛОГИКУ: Шанс 50-50 только Нижний или Верхний
            const options = ['card-under', 'card-over'];
            const winner = options[Math.floor(Math.random() * options.length)];
            document.getElementById(winner).classList.add('active');
            
            // Камера прыгает к точке
            const l = (Math.random()-0.5)*120, g = (Math.random()-0.5)*360;
            world.pointOfView({ lat: l, lng: g, alt: 2 }, 2000);
            
            const logBox = document.getElementById('log-display');
            logBox.innerHTML += `<div>> DONE: ${winner.split('-')[1].toUpperCase()}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function actionLoadLog() {
            document.getElementById('log-display').innerHTML += `<div>> System Check... OK</div>`;
        }

        // Подгонка размера под экран
        window.addEventListener('resize', () => {
            world.width(window.innerWidth);
            world.height(document.getElementById('globeViz').offsetHeight);
        });
        world.width(window.innerWidth);
        world.height(document.getElementById('globeViz').offsetHeight);

        // JavaScript фикс для проверки гифки
        const carGif = document.getElementById('car-gif');
        carGif.onerror = function() {
            document.getElementById('log-display').innerHTML += `<div style="color: red;">> Error: car GIF not found at src="1.gif"</div>`;
        };
    </script>
</body>
</html>
