<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HOUR RUSH ANALYZER</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --bg-dark: #060614;
            --panel-bg: #0a0a1f;
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --accent-purple: #4b0082; 
            --column-heading: #6666cc; 
            --color-under: #ff3333;
            --color-range: #00ddee;
            --color-over: #00ff44;
            --color-exact: #ffaa00;
            --card-opacity: 0.15;
        }

        body.light-mode {
            --bg-dark: #f0f2f5;
            --panel-bg: #ffffff;
            --border-color: rgba(0, 0, 0, 0.1);
            --text-main: #1a1a1a;
            --accent-purple: #6200ee;
            --column-heading: #5c5c5c;
            --card-opacity: 0.05;
        }

        body, html {
            margin: 0; padding: 0; 
            height: 100dvh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            position: relative;
        }

        /* ЦЕНТРИРОВАНИЕ ПЛАНЕТЫ */
        #globeViz { 
            position: absolute;
            top: 0; /* Сместил вниз с -15vh */
            left: 0; 
            width: 100%; 
            height: 60vh; /* Оптимальная высота для центра */
            z-index: 1;
        }

        .side-controls {
            position: absolute; top: 15px; right: 20px;
            display: flex; flex-direction: column; gap: 10px; z-index: 1002;
        }

        .lang-btn, .theme-btn {
            background: rgba(0,0,0,0.6); border: 1px solid var(--border-color);
            border-radius: 50%; width: 36px; height: 36px; display: flex;
            align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .bottom-panel {
            position: absolute; bottom: 0; left: 0; right: 0;
            background-color: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            border-radius: 25px 25px 0 0;
            padding: 15px 15px calc(15px + env(safe-area-inset-bottom));
            display: flex; flex-direction: column; gap: 12px; z-index: 10;
        }

        .prediction-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }

        .outcome-card {
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 8px; background: rgba(128, 128, 128, var(--card-opacity)); 
            border: 1px solid var(--border-color); border-radius: 12px; opacity: 0.3;
            transition: all 0.3s ease;
        }

        /* МЯГКОЕ СВЕЧЕНИЕ */
        .outcome-card.active-signal { 
            opacity: 1 !important;
            border: 1px solid #00ff44 !important; 
            box-shadow: 0 0 15px rgba(0, 255, 68, 0.4); /* Сделал свечение слабее */
            background: rgba(0, 255, 68, 0.1) !important;
            transform: scale(1.02);
        }

        .icon { width: 24px; height: 24px; border-radius: 50%; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; color: #fff !important; }
        .icon.under { background: var(--color-under); }
        .icon.range { background: var(--color-range); }
        .icon.over { background: var(--color-over); }
        .icon.exact { background: var(--color-exact); }

        .outcome-label { font-size: 0.6rem; font-weight: bold; margin-top: 4px; color: #aaa; }
        .active-signal .outcome-label { color: #00ff44 !important; }

        .controls-grid { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 10px; align-items: end; }
        .column { display: flex; flex-direction: column; gap: 5px; }
        
        /* Возвращаем компактный размер заголовков */
        h2 { font-size: 0.65rem; color: var(--column-heading); margin: 0; text-transform: uppercase; font-weight: 800; }
        
        .btn-action {
            width: 100%; padding: 12px 5px; background: var(--accent-purple); color: #fff; 
            border: none; border-radius: 10px; text-transform: uppercase; font-size: 0.65rem; font-weight: 800; cursor: pointer;
        }
        .btn-analyze { background: #530094; padding: 15px 5px; }

        .log-box {
            background: rgba(0,0,0,0.3); border: 1px solid var(--border-color);
            padding: 6px; font-size: 0.6rem; height: 55px; overflow-y: auto; border-radius: 8px; font-family: monospace;
        }

        /* ЗАГРУЗКА БЕЗ МАШИНКИ */
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: none; justify-content: center; 
            align-items: center; flex-direction: column; z-index: 9999;
        }
        .loader-bar { width: 120px; height: 2px; background: rgba(255,255,255,0.1); position: relative; overflow: hidden; }
        .loader-bar::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: var(--color-over); animation: loading 1.5s infinite; }
        @keyframes loading { 100% { left: 100%; } }

        .header-tag {
            position: absolute; top: 15px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 20px;
            font-size: 0.65rem; font-weight: bold; border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

    <div class="header-tag" id="analyzer-header">HOUR RUSH ANALYZER</div>

    <div class="side-controls">
        <div class="lang-btn" id="current-lang" onclick="toggleLang()">🇷🇺</div>
        <div class="theme-btn" onclick="toggleTheme()">🌙</div>
    </div>
    
    <div id="globeViz"></div>

    <div id="loading-overlay" class="loading-overlay">
        <div class="loader-bar"></div>
        <div style="color: white; font-family: monospace; margin-top: 15px; font-size: 0.7rem; letter-spacing: 2px;" id="scanning-text">АНАЛИЗ ДАННЫХ...</div>
    </div>

    <div class="bottom-panel">
        <div>
            <h2 id="ui-outcome">ИСХОД:</h2>
            <div class="prediction-row">
                <div class="outcome-card" id="card-under"><div class="icon under">▼</div><div class="outcome-label">UNDER</div></div>
                <div class="outcome-card" id="card-range"><div class="icon range">↔</div><div class="outcome-label">RANGE</div></div>
                <div class="outcome-card" id="card-over"><div class="icon over">▲</div><div class="outcome-label">OVER</div></div>
                <div class="outcome-card" id="card-exact"><div class="icon exact">★</div><div class="outcome-label">EXACT</div></div>
            </div>
        </div>

        <div class="controls-grid">
            <div class="column">
                <h2 id="ui-status">СТАТУС:</h2>
                <div style="font-size: 0.6rem; color: #fff;" id="ui-static-log">> Готов</div>
                <button class="btn-action" onclick="addLog('ЛОГ ЗАГРУЖЕН')">ЛОГ</button>
            </div>
            <div class="column">
                <button class="btn-action btn-analyze" id="ui-btn-analyze" onclick="startAnalysis()">АНАЛИЗ</button>
            </div>
            <div class="column">
                <h2 id="ui-syslog">ЛОГ:</h2>
                <div class="log-box" id="log-display">
                    <div>> НОМЕР ЗАГРУЖЕН.</div>
                    <div>> ЛОГ ЗАГРУЖЕН.</div>
                </div>
            </div>
        </div>
    </div>

    <script src="//unpkg.com/globe.gl"></script>
    <script>
        const world = Globe()(document.getElementById('globeViz'))
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
            .backgroundColor('rgba(0,0,0,0)')
            .showAtmosphere(true)
            .atmosphereColor('#4b0082')
            .onGlobeReady(() => {
                world.controls().autoRotate = true;
                world.controls().autoRotateSpeed = 1.8;
                // Центрируем камеру
                world.pointOfView({ lat: 20, lng: 0, alt: 2.2 });
            });

        setInterval(() => {
            if (!world.controls().autoRotate) world.controls().autoRotate = true;
        }, 2000);

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        function startAnalysis() {
            document.querySelectorAll('.outcome-card').forEach(c => c.classList.remove('active-signal'));
            document.getElementById('loading-overlay').style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('loading-overlay').style.display = 'none';
                const overCard = document.getElementById('card-over');
                overCard.classList.add('active-signal');
                addLog("АНАЛИЗ ЗАВЕРШЕН: OVER");
            }, 1500);
        }

        function addLog(msg) {
            const b = document.getElementById('log-display');
            b.innerHTML += `<div>> ${msg}</div>`;
            b.scrollTop = b.scrollHeight;
        }

        window.addEventListener('resize', () => {
            world.width(window.innerWidth);
            world.height(document.getElementById('globeViz').offsetHeight);
        });
        world.width(window.innerWidth);
        world.height(document.getElementById('globeViz').offsetHeight);
    </script>
</body>
</html>
