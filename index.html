<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUSH HOUR ANALYZER</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 500px;
            margin-top: 20px;
            text-align: center;
        }

        h1 {
            color: #bc13fe;
            text-shadow: 0 0 15px #bc13fe;
            font-size: 24px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .search-box {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background: #000;
            border: 1px solid #bc13fe;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            outline: none;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #bc13fe;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 10px #bc13fe;
            transition: 0.3s;
        }

        button:active {
            transform: scale(0.98);
            box-shadow: 0 0 5px #bc13fe;
        }

        #map-container {
            margin-top: 20px;
            width: 100%;
            display: none; /* Скрыто до первого поиска */
        }

        iframe {
            width: 100%;
            height: 350px;
            border: 1px solid #bc13fe;
            border-radius: 12px;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>RUSH HOUR ANALYZER</h1>
    
    <div class="search-box">
        <input type="text" id="camInput" placeholder="Введи название или адрес...">
        <button onclick="findLocation()">ОПРЕДЕЛИТЬ МЕСТО</button>
    </div>

    <div id="map-container">
        <iframe id="mapFrame" frameborder="0" scrolling="no" marginheight="0" marginwidth="0"></iframe>
    </div>

    <div class="footer">
        X77 PRIVATE SYSTEM v1.0
    </div>
</div>

<script>
    // База данных твоих локаций (координаты взяты по твоим фото)
    const cameraDb = {
        "I-5 SANTA ANA": "33.9912,-118.1501",
        "I-710 LONG BEACH": "33.9715,-118.1755",
        "FREEDOM SQUARE": "53.2045,6.5512",
        "SOUTHERN RING": "53.2030,6.5645",
        "LENIN-DRUZHBY": "56.6215,47.8540",
        "GRAND AVE": "39.5482,-107.3255",
        "PIATA ROMAN VODA": "46.9275,26.9458",
        "SAINT BON SQUARE": "44.1105,9.8145"
    };

    function findLocation() {
        const query = document.getElementById('camInput').value.toUpperCase().trim();
        const mapContainer = document.getElementById('map-container');
        const mapFrame = document.getElementById('mapFrame');
        
        let targetCoords = "";

        // Ищем совпадение в базе
        for (let key in cameraDb) {
            if (query.includes(key)) {
                targetCoords = cameraDb[key];
                break;
            }
        }

        if (targetCoords) {
            // Если нашли координаты в базе — используем их для точности
            const embedUrl = `https://www.google.com/maps?q=${targetCoords}&z=16&output=embed`;
            mapFrame.src = embedUrl;
            mapContainer.style.display = "block";
        } else if (query.length > 3) {
            // Если в базе нет, пробуем искать просто по тексту через Google
            const embedUrl = `https://www.google.com/maps?q=${encodeURIComponent(query)}&z=14&output=embed`;
            mapFrame.src = embedUrl;
            mapContainer.style.display = "block";
        } else {
            alert("Пожалуйста, введи корректное название камеры.");
        }
    }

    // Позволяет нажимать Enter для поиска
    document.getElementById('camInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            findLocation();
        }
    });
</script>

</body>
</html>
