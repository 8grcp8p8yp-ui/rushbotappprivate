<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUSH HOUR</title>
    <style>
        body { margin: 10px; font-family: sans-serif; background: #000; color: #fff; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        iframe { width: 100%; height: 500px; border: 1px solid #ccc; display: none; }
    </style>
</head>
<body>

    <input type="text" id="camInput" placeholder="ДАННЫЕ" oninput="search()">
    <iframe id="map"></iframe>

    <script>
        const db = {
            "SANTA ANA": "33.9912,-118.1501",
            "LONG BEACH": "33.9715,-118.1755",
            "FREEDOM": "53.2045,6.5512",
            "SOUTHERN": "53.2030,6.5645",
            "LENIN": "56.6215,47.8540",
            "GRAND": "39.5482,-107.3255",
            "ROMAN VODA": "46.9275,26.9458",
            "SAINT BON": "44.1105,9.8145"
        };

        function search() {
            const val = document.getElementById('camInput').value.toUpperCase();
            const map = document.getElementById('map');
            let coords = "";

            for (let key in db) {
                if (val.includes(key)) {
                    coords = db[key];
                    break;
                }
            }

            if (coords) {
                map.src = `https://www.google.com/maps?q=${coords}&z=17&output=embed`;
                map.style.display = "block";
            }
        }
    </script>
</body>
</html>
