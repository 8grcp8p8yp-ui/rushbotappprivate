<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RUSH HOUR ANALYZER</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --bg-dark: #060614;
            --panel-bg: #0a0a1f;
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --accent-purple: #4b0082; 
            --column-heading: #6666cc; 
            --color-under: #ff3333;
            --color-range: #00ddee;
            --color-over: #00ff44;
            --color-exact: #ffaa00;
        }

        body, html {
            margin: 0; padding: 0; 
            height: 100dvh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Контейнер для планеты и панели, чтобы опустить их */
        .globe-and-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Планета стала меньше и чуть ниже */
        #globeViz { 
            flex: 1; 
            width: 100%; 
            background: #000; 
            max-height: 35%; /* Уменьшил до 35% */
            margin-top: -10px; /* Сдвигаем еще выше, но панель опустим */
        }

        /* Опускаем нижнюю панель чуть ниже */
        .bottom-panel {
            margin-top: 10px; /* Опускаем панель */
            background-color: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            border-radius: 25px 25px 0 0;
            padding: 20px 15px calc(20px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .prediction-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        /* Выравнивание кнопок АНАЛИЗ и LOG по нижней линии */
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            align-items: end; /* Выравнивает всё по нижней линии */
        }

        .column { display: flex; flex-direction: column; gap: 8px; }
        
        h2 { 
            font-size: 0.65rem; 
            color: var(--column-heading); 
            margin: 0; 
            text-transform: uppercase; 
            font-weight: bold;
        }

        .static-log-text { font-size: 0.7rem; color: #fff; font-family: monospace; }
        /*release text cleaned*/
        .version-tag { font-size: 0.6rem; color: #555; font-family: monospace; margin-top: 5px; text-align: center; }

        .btn-action {
            width: 100%;
            padding: 14px 5px;
            background: var(--accent-purple); 
            color: #fff; 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            text-transform: uppercase; 
            font-size: 0.65rem; 
            font-weight: 800;
            cursor: pointer;
        }

        .btn-analyze {
            background: #530094;
            padding: 16px 5px;
        }

        .log-box {
            background: rgba(0,0,0,0.4); border: 1px solid var(--border-color);
            padding: 8px; font-size: 0.65rem; color: #00ff44;
            height: 65px; overflow-y: auto; font-family: monospace; border-radius: 10px;
        }

        .outcome-card {
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 10px; background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--border-color); border-radius: 12px; opacity: 0.2;
            transition: 0.3s;
        }

        .outcome-card.active { opacity: 1; }
        #card-under.active { border-color: var(--color-under); box-shadow: 0 0 15px rgba(255, 51, 51, 0.2); }
        #card-range.active { border-color: var(--color-range); box-shadow: 0 0 15px rgba(0, 221, 238, 0.2); }
        #card-over.active { border-color: var(--color-over); box-shadow: 0 0 15px rgba(0, 255, 68, 0.2); }
        #card-exact.active { border-color: var(--color-exact); box-shadow: 0 0 15px rgba(255, 170, 0, 0.2); }
        
        .icon { width: 26px; height: 26px; border-radius: 50%; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; }
        .icon.under { background: var(--color-under); }
        .icon.range { background: var(--color-range); }
        .icon.over { background: var(--color-over); }
        .icon.exact { background: var(--color-exact); }
        .outcome-label { font-size: 0.55rem; font-weight: bold; margin-top: 4px; color: #aaa; }

        .header-tag {
            position: absolute; top: 15px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.7); padding: 6px 14px;
            border: 1px solid var(--border-color); font-size: 0.65rem;
            color: white; border-radius: 20px; font-weight: bold;
        }

        /* Выбор языка флагами */
        .lang-selector {
            position: absolute; top: 15px; right: 20px; z-index: 1002;
        }
        .lang-btn {
            background: rgba(0,0,0,0.8); border: 1px solid var(--border-color);
            border-radius: 50%; width: 35px; height: 35px; display: flex;
            align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer;
        }
        .lang-menu {
            position: absolute; top: 45px; right: 0; background: var(--panel-bg);
            border: 1px solid var(--border-color); border-radius: 10px;
            display: none; flex-direction: column; overflow: hidden;
        }
        .lang-menu div { padding: 10px 15px; cursor: pointer; font-size: 1.2rem; }
        .lang-menu div:hover { background: rgba(255,255,255,0.1); }

        /* Новая загрузка: 2D Машинка и Текст */
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(6, 6, 20, 0.95);
            display: none; justify-content: center; align-items: center; flex-direction: column;
            z-index: 9999;
        }
        /* 2D Машинка */
        .car-loader-2d {
            width: 100px; height: 50px;
            position: relative;
            margin-bottom: 10px; /* Над полоской */
        }
        .car-loader-2d::after {
            content: ''; width: 80px; height: 25px; background: white; border-radius: 5px 20px 5px 5px;
            position: absolute; top: 15px; left: 10px;
        }
        .wheel-2d {
            width: 16px; height: 16px; background: #333; border-radius: 50%;
            position: absolute; bottom: 0; border: 2px solid white;
            animation: spin-2d 0.5s linear infinite;
        }
        .wheel-back-2d { left: 20px; } .wheel-front-2d { right: 25px; }
        @keyframes spin-2d { 100% { transform: rotate(360deg); } }

        .loader-line {
            width: 120px; height: 3px; background: rgba(255,255,255,0.1);
            position: relative; overflow: hidden; border-radius: 2px;
        }
        .loader-line::after {
            content: ''; width: 40px; height: 100%; background: var(--accent-purple);
            position: absolute; left: -40px; animation: move 0.8s linear infinite;
        }
        @keyframes move { 0% { left: -40px; } 100% { left: 120px; } }
        /* ЗАГРУЗКА... text */
        .loading-text { color: white; font-size: 0.8rem; margin-top: 15px; font-family: monospace; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="header-tag" id="analyzer-header">RUSH HOUR ANALYZER</div>

    <div class="lang-selector">
        <div class="lang-btn" id="current-lang" onclick="toggleLang()">🇷🇺</div>
        <div class="lang-menu" id="lang-menu">
            <div onclick="changeLang('ru', '🇷🇺')">🇷🇺</div>
            <div onclick="changeLang('en', '🇬🇧')">🇬🇧</div>
            <div onclick="changeLang('pt', '🇵🇹')">🇵🇹</div>
        </div>
    </div>
    
    <div class="globe-and-panel">
        <div id="globeViz"></div>

        <div id="loading-overlay" class="loading-overlay">
            <div class="car-loader-2d">
                <div class="wheel-2d wheel-back-2d"></div>
                <div class="wheel-2d wheel-front-2d"></div>
            </div>
            <div class="loader-line"></div>
            <div class="loading-text" id="scanning-text">ЗАГРУЗКА...</div>
        </div>

        <div class="bottom-panel">
            <div>
                <h2 id="ui-outcome">ИСХОД:</h2>
                <div class="prediction-row">
                    <div class="outcome-card" id="card-under"><div class="icon under">▼</div><div class="outcome-label">UNDER</div></div>
                    <div class="outcome-card" id="card-range"><div class="icon range">↔</div><div class="outcome-label">RANGE</div></div>
                    <div class="outcome-card" id="card-over"><div class="icon over">▲</div><div class="outcome-label">OVER</div></div>
                    <div class="outcome-card" id="card-exact"><div class="icon exact">★</div><div class="outcome-label">EXACT</div></div>
                </div>
            </div>

            <div class="controls-grid">
                <div class="column">
                    <h2 id="ui-status">STATUS:</h2>
                    <div class="static-log-text">> OK</div>
                    <button class="btn-action" id="ui-btn-load" onclick="actionLoadLog()">LOG</button>
                </div>
                <div class="column">
                    <button class="btn-action btn-analyze" id="ui-btn-analyze" onclick="startAnalysis()">АНАЛИЗ</button>
                </div>
                <div class="column">
                    <h2 id="ui-syslog">LOG:</h2>
                    <div class="log-box" id="log-display"></div>
                </div>
            </div>
            <div class="version-tag" id="release-footer-text">release 1.0.9</div>
        </div>
    </div>

    <script src="//unpkg.com/globe.gl"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Инициализация глобуса с темной темой
        const world = Globe()(document.getElementById('globeViz'))
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
            .backgroundColor('#060614')
            .showAtmosphere(true)
            .atmosphereColor('#4b0082')
            .atmosphereDaylightAlpha(0.1);

        // ИСПРАВИЛ: ПЛАНЕТА КРУТИТСЯ САМА ВСЕ ВРЕМЯ МЕДЛЕННО
        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 1.2; // медленная скорость
        world.controls().enableZoom = false; // Отключаем зум, чтобы не мешал скроллу

        // --- СЛОВАРЬ ПЕРЕВОДОВ ДЛЯ ВСЕХ ЭЛЕМЕНТОВ ---
        const dictionary = {
            ru: {
                header: "RUSH HOUR ANALYZER",
                footer: "release 1.0.9",
                outcome: "ИСХОД:", status: "STATUS:", syslog: "LOG:",
                cardUnder: "UNDER", cardRange: "RANGE", cardOver: "OVER", cardExact: "EXACT",
                btnLoad: "LOG", btnAnalyze: "АНАЛИЗ",
                loading: "ЗАГРУЗКА...",
                logDone: "АНАЛИЗ ЗАВЕРШЕН: ", logSystem: "Системная проверка... OK"
            },
            en: {
                header: "RUSH HOUR ANALYZER",
                footer: "release 1.0.9",
                outcome: "OUTCOME:", status: "STATUS:", syslog: "LOG:",
                cardUnder: "UNDER", cardRange: "RANGE", cardOver: "OVER", cardExact: "EXACT",
                btnLoad: "LOG", btnAnalyze: "ANALYZE",
                loading: "SCANNING...",
                logDone: "ANALYSIS DONE: ", logSystem: "System Check... OK"
            },
            pt: {
                header: "RUSH HOUR ANALYZER",
                footer: "release 1.0.9",
                outcome: "RESULTADO:", status: "STATUS:", syslog: "LOG:",
                cardUnder: "BAIXO", cardRange: "FAIXA", cardOver: "ALTO", cardExact: "EXATO",
                btnLoad: "LOG", btnAnalyze: "ANALISAR",
                loading: "DIGITALIZAÇÃO...",
                logDone: "ANÁLISE FEITA: ", logSystem: "Verificação do Sistema... OK"
            }
        };

        let currentLang = 'ru';

        function toggleLang() {
            const menu = document.getElementById('lang-menu');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        // ИСПРАВИЛ: ПОЛНЫЙ ПЕРЕВОД ВСЕГО ИНТЕРФЕЙСА
        function changeLang(code, flag) {
            document.getElementById('current-lang').innerText = flag;
            toggleLang();
            currentLang = code;
            updateUITranslations();
        }

        function updateUITranslations() {
            const t = dictionary[currentLang];
            
            // Заголовок и подвал
            document.getElementById('analyzer-header').innerText = t.header;
            document.getElementById('release-footer-text').innerText = t.footer;

            // Заголовки панелей
            document.getElementById('ui-outcome').innerText = t.outcome;
            document.getElementById('ui-status').innerText = t.status;
            document.getElementById('ui-syslog').innerText = t.syslog;

            // Карты результатов
            document.querySelectorAll('.outcome-card .outcome-label')[0].innerText = t.cardUnder;
            document.querySelectorAll('.outcome-card .outcome-label')[1].innerText = t.cardRange;
            document.querySelectorAll('.outcome-card .outcome-label')[2].innerText = t.cardOver;
            document.querySelectorAll('.outcome-card .outcome-label')[3].innerText = t.cardExact;

            // Кнопки
            document.getElementById('ui-btn-load').innerText = t.btnLoad;
            document.getElementById('ui-btn-analyze').innerText = t.btnAnalyze;

            // Текст загрузки
            document.getElementById('scanning-text').innerText = t.loading;
        }

        function startAnalysis() {
            document.querySelectorAll('.outcome-card').forEach(c => c.classList.remove('active'));
            
            // Шанс 60% на быструю загрузку (1 сек)
            if (Math.random() < 0.6) {
                const loader = document.getElementById('loading-overlay');
                loader.style.display = 'flex';
                setTimeout(() => {
                    loader.style.display = 'none';
                    showResult();
                }, 1000); // Ровно 1 секунда
            } else {
                showResult();
            }
        }

        function showResult() {
            const t = dictionary[currentLang];
            const res = ['card-under', 'card-over', 'card-range', 'card-exact'];
            const winner = res[Math.floor(Math.random() * res.length)];
            document.getElementById(winner).classList.add('active');
            
            // Камера прыгает к точке
            const l = (Math.random()-0.5)*100, g = (Math.random()-0.5)*360;
            world.pointOfView({ lat: l, lng: g, alt: 1.8 }, 1200);
            
            // ИСПРАВИЛ: ЛОГИ ТОЖЕ ПЕРЕВЕДЕНЫ
            addLog(`${t.logDone}${winner.split('-')[1].toUpperCase()}`);
        }

        function actionLoadLog() {
            const t = dictionary[currentLang];
            addLog(t.logSystem);
        }

        function addLog(msg) {
            const b = document.getElementById('log-display');
            b.innerHTML += `<div>> ${msg}</div>`;
            b.scrollTop = b.scrollHeight;
        }

        // Подгонка размера глобуса под экран
        window.addEventListener('resize', () => {
            world.width(window.innerWidth);
            world.height(document.getElementById('globeViz').offsetHeight);
        });
        world.width(window.innerWidth);
        world.height(document.getElementById('globeViz').offsetHeight);
    </script>
</body>
</html>
