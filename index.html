<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RUSH HOUR ANALYZER</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --bg-dark: #060614;
            --panel-bg: #0a0a1f;
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #aaccff;
            --accent-purple: #4b0082; 
            --column-heading: #6666cc; 
            
            --color-under: #ff3333;
            --color-range: #00ddee;
            --color-over: #00ff44;
            --color-exact: #ffaa00;
        }

        body, html {
            margin: 0; padding: 0; 
            height: 100dvh; /* Динамическая высота для iPhone */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Контейнер для планеты - теперь он занимает меньше места, чтобы влезла панель */
        #globeViz { 
            flex: 1; 
            width: 100%; 
            background: #000; 
            max-height: 45%; /* Ограничение, чтобы панель снизу всегда была видна */
        }

        .bottom-panel {
            background-color: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            border-radius: 20px 20px 0 0;
            padding: 15px 15px calc(15px + env(safe-area-inset-bottom)); /* Учитываем "челку" снизу */
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        .prediction-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .column { display: flex; flex-direction: column; gap: 5px; }
        
        h2 { 
            font-size: 0.6rem; 
            color: var(--column-heading); 
            margin: 0; 
            text-transform: uppercase; 
            font-weight: bold;
        }

        .static-log-text { font-size: 0.65rem; color: #ffffff; font-family: monospace; }
        .version-tag { font-size: 0.55rem; color: #666; font-family: monospace; }

        .btn-action {
            width: 100%;
            padding: 12px 5px;
            background: var(--accent-purple); 
            color: #fff; 
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            text-transform: uppercase; 
            font-size: 0.6rem; 
            font-weight: 700; 
        }

        .btn-analyze {
            padding: 15px 5px; 
            font-size: 0.7rem;
            background: #530094;
        }

        .log-box {
            background: rgba(0,0,0,0.3); border: 1px solid var(--border-color);
            padding: 5px; font-size: 0.6rem; color: #ffffff;
            height: 60px; overflow-y: auto; font-family: monospace; border-radius: 8px;
        }

        .outcome-card {
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 6px; background: rgba(255, 255, 255, 0.02); 
            border: 1px solid var(--border-color); border-radius: 10px; opacity: 0.2;
        }

        .outcome-card.active { opacity: 1; }
        #card-under.active { border-color: var(--color-under); background: rgba(255, 51, 51, 0.15); }
        #card-range.active { border-color: var(--color-range); background: rgba(0, 221, 238, 0.15); }
        #card-over.active { border-color: var(--color-over); background: rgba(0, 255, 68, 0.15); }
        #card-exact.active { border-color: var(--color-exact); background: rgba(255, 170, 0, 0.15); }
        
        .icon { width: 24px; height: 24px; border-radius: 50%; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; }
        .icon.under { background: var(--color-under); }
        .icon.range { background: var(--color-range); }
        .icon.over { background: var(--color-over); }
        .icon.exact { background: var(--color-exact); }
        .outcome-label { font-size: 0.5rem; font-weight: bold; margin-top: 2px; }

        .header-tag {
            position: absolute; top: 15px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.8); padding: 5px 12px;
            border: 1px solid var(--border-color); font-size: 0.65rem;
            color: white; border-radius: 20px;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none; justify-content: center; align-items: center; flex-direction: column;
            z-index: 9999;
        }
        .loading-text { color: white; font-size: 1.2rem; margin-top: 20px; font-family: monospace; }
        
        /* Car Animation */
        .car-loader { width: 100px; height: 50px; position: relative; }
        .car-body { width: 80px; height: 25px; background: white; border-radius: 5px 20px 5px 5px; position: absolute; top: 15px; }
        .wheel { width: 16px; height: 16px; background: #333; border-radius: 50%; position: absolute; bottom: 0; border: 2px solid white; animation: spin 0.5s linear infinite; }
        .wheel-back { left: 10px; } .wheel-front { right: 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header-tag">RUSH HOUR ANALYZER</div>
    
    <div id="globeViz"></div>

    <div id="loading-overlay" class="loading-overlay">
        <div class="car-loader">
            <div class="car-body"></div>
            <div class="wheel wheel-back"></div>
            <div class="wheel wheel-front"></div>
        </div>
        <div class="loading-text">ЗАГРУЗКА...</div>
    </div>

    <div class="bottom-panel">
        <div class="outcomes-section">
            <h2 id="ui-outcome">ИСХОД:</h2>
            <div class="prediction-row">
                <div class="outcome-card" id="card-under"><div class="icon under">▼</div><div class="outcome-label">Under</div></div>
                <div class="outcome-card" id="card-range"><div class="icon range">↔</div><div class="outcome-label">Range</div></div>
                <div class="outcome-card" id="card-over"><div class="icon over">▲</div><div class="outcome-label">Over</div></div>
                <div class="outcome-card" id="card-exact"><div class="icon exact">★</div><div class="outcome-label">Exact</div></div>
            </div>
        </div>

        <div class="controls-grid">
            <div class="column">
                <h2 id="ui-status">СТАТУС:</h2>
                <div class="static-log-text">> <span id="ui-log-loaded">OK</span></div>
                <button class="btn-action" onclick="actionLoadLog()">LOG</button>
            </div>
            <div class="column">
                <div style="height: 15px;"></div> 
                <button class="btn-action btn-analyze" onclick="triggerAnalysis()">АНАЛИЗ</button>
            </div>
            <div class="column">
                <h2 id="ui-syslog">LOG:</h2>
                <div class="log-box" id="log-display"></div>
            </div>
        </div>
        <div class="version-tag">release 1.0.9 | @rush_hour_x77_bot</div>
    </div>

    <script src="//unpkg.com/globe.gl"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Инициализация глобуса (ТЕМНАЯ ТЕМА)
        const world = Globe()(document.getElementById('globeViz'))
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
            .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
            .backgroundColor('#060614')
            .showAtmosphere(true)
            .atmosphereColor('#4b0082')
            .atmosphereDaylightAlpha(0.1);

        // Настройка вращения (ВСЕГДА МЕДЛЕННО)
        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 0.8;
        world.controls().enableZoom = false; // Отключаем зум, чтобы не мешал скроллу на мобиле

        function triggerAnalysis() {
            document.querySelectorAll('.outcome-card').forEach(c => c.classList.remove('active'));
            
            if (Math.random() < 0.6) {
                const overlay = document.getElementById('loading-overlay');
                overlay.style.display = 'flex';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    finishAnalysis();
                }, 4000);
            } else {
                finishAnalysis();
            }
        }

        function finishAnalysis() {
            const options = ['card-under', 'card-over', 'card-range', 'card-exact'];
            const winner = options[Math.floor(Math.random() * options.length)];
            document.getElementById(winner).classList.add('active');
            
            // Прыжок камеры к случайной точке при результате
            const coords = { lat: (Math.random()-0.5)*120, lng: (Math.random()-0.5)*360 };
            world.pointOfView({ ...coords, alt: 2 }, 2000);
            
            const logBox = document.getElementById('log-display');
            logBox.innerHTML += `<div>> DONE: ${winner.split('-')[1].toUpperCase()}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function actionLoadLog() {
            document.getElementById('log-display').innerHTML += `<div>> System Check... OK</div>`;
        }

        // Подгонка размера под экран
        window.addEventListener('resize', () => {
            world.width(window.innerWidth);
            world.height(document.getElementById('globeViz').offsetHeight);
        });
        world.width(window.innerWidth);
        world.height(document.getElementById('globeViz').offsetHeight);
    </script>
</body>
</html>
